name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  schedule:
    # 每天凌晨 0 点（UTC 时间，即北京时间早上 8 点）自动拉取一次数据并更新页面
    - cron: '0 0 * * *'
  # 允许在 GitHub Actions 页面手动点击按钮触发
  workflow_dispatch:

# 设置权限以允许推送到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout Repo)
        uses: actions/checkout@v4

      - name: 设置 Python 环境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r blog/requirements.txt

      - name: 生成静态网站 (Generate Static Site)
        # 将配置好的 GitHub Secrets 作为环境变量传入
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BASE_ID: ${{ secrets.BASE_ID }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
        run: |
          cd blog
          python freeze.py

      - name: 部署到 GitHub Pages (Deploy to GitHub Pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog/build
          cname: articles.1986318.xyz
