<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="拾读库 — 收藏过的微信公众号文章，一页读懂">
    <meta name="theme-color" content="#f4f7f2">
    <title>{% block title %}拾读库{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23c62f36'/><text x='50' y='66' text-anchor='middle' font-size='54' fill='white'>拾</text></svg>">
</head>

<body>
    <!-- Reading Progress Bar (detail page only) -->
    {% block progress_bar %}{% endblock %}

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="{{ url_for('index') }}" class="nav-brand">
                <span class="nav-brand-mark">拾</span>
                <span class="nav-brand-text">拾读库</span>
            </a>
            <div class="nav-actions">
                <button class="nav-btn desktop-only" id="searchBtn" aria-label="搜索" title="搜索">
                    <span aria-hidden="true">⌕</span>
                </button>
                <button class="nav-btn desktop-only" id="themeToggle" aria-label="切换主题" title="切换主题">
                    <span aria-hidden="true">◐</span>
                </button>
                <button class="nav-btn menu-toggle" id="menuToggle" aria-label="打开菜单">
                    <span aria-hidden="true">☰</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Sidebar -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar" aria-hidden="true">
        <button class="mobile-sidebar-close" id="mobileSidebarClose" aria-label="关闭菜单">×</button>
        <div class="mobile-nav-section">
            <div class="mobile-nav-title">导航</div>
            <a href="{{ url_for('index') }}" class="mobile-theme-btn">首页</a>
        </div>
        <div class="mobile-nav-section">
            <div class="mobile-nav-title">搜索</div>
            <button class="mobile-theme-btn" id="mobileSearchBtn">搜索文章</button>
        </div>
        <div class="mobile-nav-section">
            <div class="mobile-nav-title">外观</div>
            <button class="mobile-theme-btn" id="mobileThemeToggle">深色模式</button>
        </div>
    </div>

    <!-- Search Modal -->
    <div class="search-modal" id="searchModal" role="dialog" aria-modal="true" aria-label="搜索文章">
        <div class="search-container">
            <div class="search-input-wrap">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索标题、摘要、标签或金句..."
                    autocomplete="off">
                <button class="search-close" id="searchClose" aria-label="关闭搜索">Esc</button>
            </div>
            <div class="search-results" id="searchResults">
                <div class="search-hint">输入关键词开始搜索</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Article Data for Search (injected by templates) -->
    {% block search_data %}{% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
